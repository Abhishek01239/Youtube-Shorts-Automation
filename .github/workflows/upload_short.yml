name: Scheduled YouTube Shorts Automation

on:
  schedule:
    # Trigger 6 times daily at 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC
    - cron: '0 6,9,12,15,18,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Latest Dependencies & yt-dlp
        run: |
          python -m pip install --upgrade pip yt-dlp
          pip install -r requirements.txt
          python -m pip install -U yt-dlp
          yt-dlp --version

      - name: Create cookies file from secret
        run: |
          if [ -n "${{ secrets.COOKIES_TXT }}" ]; then
            echo "${{ secrets.COOKIES_TXT }}" > "$GITHUB_WORKSPACE/cookies.txt"
            chmod 600 "$GITHUB_WORKSPACE/cookies.txt"
            echo "Successfully wrote cookies to $GITHUB_WORKSPACE/cookies.txt"
          else
            echo "No COOKIES_TXT secret provided"
          fi
        shell: bash

      - name: Verify Cookies File Header
        run: |
          if [ -f "$GITHUB_WORKSPACE/cookies.txt" ]; then
            ls -lh "$GITHUB_WORKSPACE/cookies.txt"
            head -n 5 "$GITHUB_WORKSPACE/cookies.txt"
          else
            echo "cookies.txt file does not exist on runner"
          fi

      - name: Direct CLI yt-dlp Diagnostic Test
        run: |
          if [ -f "$GITHUB_WORKSPACE/cookies.txt" ]; then
            yt-dlp -v --cookies "$GITHUB_WORKSPACE/cookies.txt" --extractor-args "youtube:player_client=android_vr,android" "https://www.youtube.com/watch?v=N2uIZ61-G-4" || true
          fi

      - name: Execute Shorts Automation (Single Upload)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          COOKIES_TXT: ${{ secrets.COOKIES_TXT }}
          COOKIES_PATH: ${{ github.workspace }}/cookies.txt
        run: |
          python pipeline.py

      - name: Sync branch before commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git pull --rebase origin main || true

      - name: Commit & Push Updated History
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update seen_videos.txt and upload_log.json [skip ci]"
          file_pattern: "data/seen_videos.txt data/upload_log.json"
