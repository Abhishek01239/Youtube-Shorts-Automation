name: Scheduled Twitch to YouTube Shorts Automation

on:
  schedule:
    # Trigger 6 times daily at 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC
    - cron: '0 6,9,12,15,18,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Twitch Shorts Automation (Single Upload)
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: |
          python pipeline.py

      - name: Sync branch before commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git pull --rebase origin main || true

      - name: Commit & Push Updated History
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update seen_videos.txt and upload_log.json [skip ci]"
          file_pattern: "data/seen_videos.txt data/upload_log.json"
