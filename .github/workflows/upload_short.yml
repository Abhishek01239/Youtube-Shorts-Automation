name: Scheduled Twitch to YouTube Shorts Automation

on:
  schedule:
    # Trigger TWICE daily at 00:30 UTC (06:00 AM IST) and 12:30 UTC (06:00 PM IST)
    - cron: '30 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Daily Batch Shorts Automation (3 Shorts Uploaded Per Run = 6 Daily)
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
        run: |
          python pipeline.py --count 3

      - name: Commit & Push Updated History
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add data/seen_videos.txt data/upload_log.json
          git commit -m "auto: update seen_videos.txt and upload_log.json [skip ci]" || echo "No changes to commit"
          git fetch origin main
          git rebase -X ours origin/main || git rebase --abort || true
          git push origin main || true
